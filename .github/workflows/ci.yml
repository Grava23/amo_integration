name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# prisma.config.ts резолвит env("DATABASE_URL") при загрузке для любой prisma-команды
# (в т.ч. `prisma generate`, которая к БД не коннектится). Задаём фиктивное значение,
# чтобы конфиг резолвился. Интеграционные тесты используют свой URL (testcontainers).
env:
  DATABASE_URL: "postgresql://prisma:prisma@localhost:5432/prisma?schema=public"

jobs:
  unit:
    name: Unit & route tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck (build)
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage

  integration:
    name: Integration tests (real Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      # На ubuntu-latest Docker предустановлен — testcontainers поднимет Postgres сам.
      - name: Run integration tests
        run: npm run test:integration
